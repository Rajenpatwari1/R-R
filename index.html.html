    <style>
        :root {
            --bg-pure: #FFFFFF;
            --gold-prestige: #B8860B;
            --obsidian: #0F172A;
            --slate: #475569;
            --emerald: #059669;
            --f-display: 'Playfair Display', serif;
            --f-main: 'Plus Jakarta Sans', sans-serif;
            --f-accent: 'Cinzel', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg-pure);
            color: var(--obsidian);
            font-family: var(--f-main);
            overflow: hidden;
            height: 100dvh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- PERSISTENT 7D STARDUST BACKGROUND --- */
        #canvas-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
            background: radial-gradient(circle at center, #FFFFFF 0%, #F1F5F9 100%);
        }

        /* --- CORNER BRANDING --- */
        .company-logo {
            position: fixed;
            top: 4vh; left: 4vw;
            width: clamp(110px, 14vw, 160px);
            z-index: 1000;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));
        }

        /* --- THEATRE SYSTEM --- */
        .theatre {
            width: 100%; height: 100%;
            display: grid; place-items: center;
            position: relative; z-index: 10;
        }

        .slide {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; opacity: 0; visibility: hidden;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .slide.active { opacity: 1; visibility: visible; }

        /* --- PRESTIGE CARD --- */
        .content-card {
            width: 90%; max-width: 950px;
            display: flex; flex-direction: column; align-items: center;
            gap: clamp(12px, 3vh, 35px);
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(25px);
            padding: clamp(30px, 6vh, 60px);
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.9);
            text-align: center;
        }

        .portrait-frame {
            position: relative;
            width: clamp(140px, 30vh, 220px);
            aspect-ratio: 1/1;
            margin-bottom: 5px;
        }
        
        .portrait-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 8px solid #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            position: relative; z-index: 5;
        }

        .halo {
            position: absolute; top: -14px; left: -14px; right: -14px; bottom: -14px;
            border-radius: 50%; border: 1.5px solid var(--gold-prestige);
            animation: prestige-spin 15s linear infinite; opacity: 0.4;
        }
        @keyframes prestige-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .page-tag {
            font-family: var(--f-accent);
            font-size: clamp(0.65rem, 1.8vh, 0.8rem);
            font-weight: 800; text-transform: uppercase; letter-spacing: 7px;
            color: var(--gold-prestige);
            margin-bottom: -10px;
        }

        .hero-name {
            font-family: var(--f-display);
            font-size: clamp(2.5rem, 8vh, 5.5rem);
            font-weight: 900; color: var(--obsidian);
            line-height: 1.1; margin: 0;
            text-transform: capitalize;
        }

        .role-strip {
            font-size: clamp(0.75rem, 2vh, 1rem);
            font-weight: 700; letter-spacing: 12px;
            text-transform: uppercase; color: var(--slate);
            border-top: 1px solid #F1F5F9;
            padding-top: 12px; margin-top: 5px;
        }

        /* Metrics GRID */
        .metrics-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: clamp(10px, 2vw, 20px); width: 100%; max-width: 850px;
            margin-top: 10px;
        }

        @media (max-width: 650px) { .metrics-grid { grid-template-columns: 1fr; gap: 10px; } }

        .m-card {
            background: #fff; padding: clamp(15px, 2.5vh, 25px); border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            border-bottom: 3px solid transparent;
        }
        .m-card.active { border-bottom-color: var(--gold-prestige); background: #FFFEF9; }

        .m-lbl { font-size: 0.6rem; color: var(--slate); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .m-val { font-size: clamp(1rem, 2.5vh, 1.5rem); font-weight: 800; color: var(--obsidian); }
        .m-pct { font-family: var(--f-display); font-size: clamp(2rem, 5vh, 3.5rem); color: var(--emerald); font-weight: 900; }

        /* --- FRONT PAGE & ANNOUNCEMENT SPECIAL --- */
        .front-title {
            white-space: nowrap;
            font-size: clamp(1.2rem, 5.8vw, 5.2rem) !important;
            letter-spacing: -1px;
            font-weight: 900;
            color: var(--obsidian);
            line-height: 1.2;
            padding: 0 4vw;
            text-transform: uppercase;
        }

        .announcement-title {
            white-space: nowrap;
            font-size: clamp(1rem, 4.5vw, 3.5rem) !important;
            letter-spacing: 2px;
            font-weight: 900;
            color: var(--obsidian);
            line-height: 1.2;
            padding: 0 4vw;
            text-transform: uppercase;
        }

        /* --- NAVIGATION HUB --- */
        .nav-hub {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; gap: 12px; z-index: 1000;
        }

        .n-btn {
            width: 54px; height: 54px; border-radius: 50%; border: 1px solid #EEE;
            background: #FFF; color: var(--obsidian); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); transition: 0.3s;
            font-size: 1rem;
        }
        .n-btn:hover { background: var(--obsidian); color: #FFF; transform: translateY(-3px); }
        .n-btn.fs-btn { color: var(--gold-prestige); border-color: var(--gold-prestige); }

        /* --- TRANSITION GATES --- */
        .gate { background: transparent; }
        .gate h1 { color: var(--obsidian); font-family: var(--f-display); font-size: clamp(2.2rem, 10vh, 7.5rem); font-weight: 900; text-transform: uppercase; }
        .gate p { font-family: var(--f-accent); color: var(--gold-prestige); letter-spacing: 12px; font-weight: 800; text-transform: uppercase; margin-top: 15px;}

    </style>
</head>

            <p class="page-tag" style="background:var(--obsidian); color:#FFF; padding:6px 20px; border-radius:2px;">EXECUTIVE LEADERSHIP</p>
            <div class="portrait-frame" style="transform:scale(1.05)"><div class="halo" style="opacity:0.8; border-width:2px"></div><img src="https://drive.google.com/thumbnail?id=1RjO5OkXShjzvWdTHhp0LqUjtOg1fAiUo&sz=w800" class="portrait-img"></div>
            <h1 class="main-name" style="color:var(--gold-prestige); font-family: var(--f-display); font-size: clamp(2.5rem, 8vh, 5.5rem); font-weight: 900;">Dikshita Poojari</h1>

        // 10. THANK YOU Page
        html += `<div class="slide gate">
            <h1 style="font-size:clamp(3.5rem, 12vh, 9rem); margin-bottom: 20px;">THANK YOU</h1>
            <p style="font-family: var(--f-accent); color: var(--gold-prestige); letter-spacing: 8px; font-weight: 800; text-transform: uppercase;">LET'S ACHIEVE MORE IN NEXT QUARTER</p>
        </div>`;

        document.getElementById('theatre').innerHTML = html;

        // --- NAVIGATION ENGINE ---
        const slides = document.querySelectorAll('.slide');
        let index = 0;

        function refreshStage() {
            slides.forEach((s, i) => s.classList.toggle('active', i === index));
            const active = slides[index];
            gsap.fromTo(active.children[0], { y: 25, opacity: 0 }, { y: 0, opacity: 1, duration: 0.9, ease: "power3.out" });
            const counts = active.querySelectorAll('.roller');
            counts.forEach(r => {
                const targetVal = parseFloat(r.getAttribute('data-val'));
                let state = { val: 0 };
                gsap.to(state, { val: targetVal, duration: 2.2, ease: "expo.out", onUpdate: () => { r.innerText = state.val.toFixed(2) + "%"; } });
            });
        }

        function shift(dir) {
            if (dir > 0 && index < slides.length - 1) { index++; refreshStage(); }
            if (dir < 0 && index > 0) { index--; refreshStage(); }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'ArrowRight' || e.key === ' ') shift(1); if (e.key === 'ArrowLeft') shift(-1); });

        // --- 7D GOLDEN STARDUST ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-wrapper').appendChild(renderer.domElement);

        const starCount = 3500;
        const starGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(starCount * 3);
        for(let i=0; i<starCount * 3; i++) { positions[i] = (Math.random() - 0.5) * 60; }
        starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0xD4AF37, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        camera.position.z = 25;
        let mx = 0, my = 0;
        window.addEventListener('mousemove', (e) => { mx = (e.clientX - window.innerWidth/2) * 0.005; my = (e.clientY - window.innerHeight/2) * 0.005; });

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0006;
            stars.rotation.x += 0.0003;
            stars.position.x += (mx - stars.position.x) * 0.05;
            stars.position.y += (-my - stars.position.y) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });
        
        refreshStage();
    </script>
